name: Dev Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    # Temporarily disabled — pending refactor before public release
    if: false
    uses: oxidized-mc/ci/.github/workflows/cargo-publish-dev.yml@main
    with:
      packages: |
        headlesscraft-macros
        headlesscraft-protocol
        headlesscraft
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
