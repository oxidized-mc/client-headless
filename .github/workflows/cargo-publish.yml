name: Publish to crates.io

on:
  release:
    types: [published]

jobs:
  publish:
    uses: oxidized-mc/ci/.github/workflows/cargo-publish.yml@main
    with:
      packages: |
        headlesscraft-macros
        headlesscraft-protocol
        headlesscraft
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
